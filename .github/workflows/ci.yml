name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cashflow-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x ./mvnw
          ./mvnw test

  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cashflow-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/cashflow-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
